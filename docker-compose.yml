services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: recon
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon -d recon"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  fingerprinter:
    image: ghcr.io/joshuamart/fingerprinter
    ports:
      - "3001:3001"
    volumes:
      - ./fingerprinter/config.yml:/app/config.yml:ro
    depends_on:
      chrome:
        condition: service_healthy

  chrome:
    image: chromedp/headless-shell
    command:
      - --ignore-certificate-errors
      - --remote-allow-origins=*
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9222' 2>/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    image: ghcr.io/joshuamart/recon/api
    ports:
      - "3002:3002"
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy
      fingerprinter:
        condition: service_started
      chrome:
        condition: service_healthy

  web:
    image: ghcr.io/joshuamart/recon/web
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:3002
    depends_on:
      - api

volumes:
  pgdata:
