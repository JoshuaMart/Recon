x-chrome: &chrome
  image: chromedp/headless-shell
  command:
    - --ignore-certificate-errors
    - --remote-allow-origins=*
    - --disable-dev-shm-usage
    - --disable-gpu
  restart: always
  shm_size: '512m'
  deploy:
    resources:
      limits:
        memory: 2G
  healthcheck:
    test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9222' 2>/dev/null"]
    interval: 5s
    timeout: 3s
    retries: 5
    start_period: 10s
  networks:
    - recon

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: recon
      POSTGRES_USER: recon
      POSTGRES_PASSWORD: recon
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recon -d recon"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - recon

  fingerprinter:
    image: ghcr.io/joshuamart/fingerprinter
    volumes:
      - ./fingerprinter/config.yml:/app/config.yml:ro
    depends_on:
      chrome:
        condition: service_healthy
    networks:
      - recon

  chrome-1:
    <<: *chrome
  chrome-2:
    <<: *chrome
  chrome-3:
    <<: *chrome

  api:
    image: ghcr.io/joshuamart/recon/api
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy
      fingerprinter:
        condition: service_started
      chrome:
        condition: service_healthy
    networks:
      - recon

  web:
    image: ghcr.io/joshuamart/recon/web
    environment:
      NUXT_PUBLIC_API_URL: http://localhost:3002
    depends_on:
      - api
    networks:
      - recon

volumes:
  pgdata:

networks:
  recon:
