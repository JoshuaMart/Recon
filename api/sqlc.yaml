version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries/"
    schema: "db/migrations/"
    gen:
      go:
        package: "db"
        out: "db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "inet"
            nullable: true
            go_type:
              import: "net/netip"
              type: "Addr"
              pointer: true
          - db_type: "pg_catalog.inet"
            nullable: true
            go_type:
              import: "net/netip"
              type: "Addr"
              pointer: true
